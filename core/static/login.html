<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>控制台登录</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --panel: #ffffff;
        --border: #d9e0e8;
        --text: #18202a;
        --muted: #667085;
        --accent: #1f6feb;
        --danger-bg: #fef2f2;
        --danger-text: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .card {
        width: min(440px, calc(100vw - 32px));
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      p {
        margin: 6px 0 20px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      label {
        display: block;
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .field {
        margin-bottom: 13px;
      }

      input {
        width: 100%;
        min-height: 40px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        padding: 9px 11px;
        font-size: 14px;
      }

      input:focus {
        outline: 2px solid rgba(31, 111, 235, 0.18);
        border-color: var(--accent);
      }

      button {
        width: 100%;
        min-height: 42px;
        margin-top: 6px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 650;
      }

      button:disabled {
        opacity: 0.72;
        cursor: wait;
      }

      .error {
        display: none;
        margin-top: 14px;
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--danger-bg);
        color: var(--danger-text);
        font-size: 13px;
      }

      .hint {
        display: none;
        margin: -2px 0 14px;
        border-radius: 8px;
        padding: 10px 12px;
        background: #eef4ff;
        color: #1e3a8a;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <form class="card" id="loginForm">
      <h1 id="title">控制台登录</h1>
      <p id="subtitle">输入控制台密码进入后台。同济账号进入控制台后在“同济账号”页面维护。</p>
      <div class="hint" id="initHint">首次打开控制台，请先设置一个本机管理密码。密码会写入配置文件并以哈希形式保存。</div>
      <div class="field">
        <label for="secret" id="secretLabel">控制台密码</label>
        <input id="secret" name="secret" type="password" autocomplete="current-password" autofocus />
      </div>
      <div class="field" id="confirmField" style="display: none">
        <label for="confirmSecret">确认密码</label>
        <input id="confirmSecret" name="confirmSecret" type="password" autocomplete="new-password" />
      </div>
      <button type="submit" id="submitBtn">进入控制台</button>
      <div class="error" id="error"></div>
    </form>

    <script>
      const form = document.getElementById('loginForm')
      const titleEl = document.getElementById('title')
      const subtitleEl = document.getElementById('subtitle')
      const initHint = document.getElementById('initHint')
      const secretLabel = document.getElementById('secretLabel')
      const secretInput = document.getElementById('secret')
      const confirmField = document.getElementById('confirmField')
      const confirmInput = document.getElementById('confirmSecret')
      const submitBtn = document.getElementById('submitBtn')
      const errorEl = document.getElementById('error')
      let initialized = true

      function showError(message) {
        errorEl.textContent = message
        errorEl.style.display = 'block'
      }

      function renderMode() {
        if (initialized) {
          titleEl.textContent = '控制台登录'
          subtitleEl.textContent = '输入控制台密码进入后台。同济账号进入控制台后在“同济账号”页面维护。'
          initHint.style.display = 'none'
          secretLabel.textContent = '控制台密码'
          secretInput.autocomplete = 'current-password'
          confirmField.style.display = 'none'
          submitBtn.textContent = '进入控制台'
          return
        }
        titleEl.textContent = '初始化控制台'
        subtitleEl.textContent = '设置控制台密码后即可进入后台。'
        initHint.style.display = 'block'
        secretLabel.textContent = '设置密码'
        secretInput.autocomplete = 'new-password'
        confirmField.style.display = 'block'
        submitBtn.textContent = '保存并进入'
      }

      async function loadStatus() {
        try {
          const res = await fetch('/api/admin/status', { cache: 'no-store' })
          if (!res.ok) return
          const data = await res.json()
          initialized = data.initialized !== false
          if (data.logged_in) {
            window.location.href = '/config'
            return
          }
          renderMode()
        } catch (_) {
          renderMode()
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault()
        errorEl.style.display = 'none'
        const secret = secretInput.value.trim()
        if (!secret) {
          showError(initialized ? '请输入控制台密码' : '请设置控制台密码')
          return
        }
        if (!initialized && secret !== confirmInput.value.trim()) {
          showError('两次输入的密码不一致')
          return
        }
        submitBtn.disabled = true
        submitBtn.textContent = initialized ? '正在进入...' : '正在保存...'
        try {
          const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ secret }),
          })
          if (!res.ok) {
            let message = '登录失败'
            try {
              const data = await res.json()
              message = data.detail || message
            } catch (_) {
              const text = await res.text()
              message = text || message
            }
            throw new Error(message)
          }
          window.location.href = '/config'
        } catch (err) {
          showError(err.message || '登录失败')
          submitBtn.disabled = false
          renderMode()
        }
      })

      loadStatus()
    </script>
  </body>
</html>
